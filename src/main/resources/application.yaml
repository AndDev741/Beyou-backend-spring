spring:
  profiles:
    active: ${ACTIVE_PROFILE}
  threads:
    virtual:
      enabled: true
  application:
    name: backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5490/beyou}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8099
  address: 0.0.0.0

cookie:
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Lax}

cors:
  allowed-pattern: ${CORS_ALLOWED_PATTERN}

api:
  security:
    token:
      secret: ${TOKEN_SECRET}

google:
  secrets:
    clientId: ${GOOGLE_CLIENT_ID}
    clientSecret: ${GOOGLE_CLIENT_SECRET}
  url:
    oauth: ${OAUTH_GOOGLE_URL}
    userInfo: ${USER_INFO_GOOGLE_URL}

frontend:
    url: ${FRONTEND_URL}

mail:
  from: ${MAIL_FROM:${MAIL_USERNAME}}

password-reset:
  token-ttl-minutes: ${PASSWORD_RESET_TTL_MINUTES:15}
  cooldown-minutes: ${PASSWORD_RESET_COOLDOWN_MINUTES:5}

rate-limit:
  enabled: true

docs:
  import:
    repoOwner: ${DOCS_IMPORT_REPO_OWNER:AndDev741}
    repoName: ${DOCS_IMPORT_REPO_NAME:beyou-arch-design}
    branch: ${DOCS_IMPORT_BRANCH:main}
    path: ${DOCS_IMPORT_PATH:architecture}
    blog:
      path: ${DOCS_IMPORT_BLOG_PATH:blog}
    api:
      path: ${DOCS_IMPORT_API_PATH:api}
    projects:
      path: ${DOCS_IMPORT_PROJECTS_PATH:projects}
    token: ${DOCS_IMPORT_TOKEN:}
    secret: ${DOCS_IMPORT_SECRET:}

management:
  server:
    port: ${MANAGEMENT_PORT:9091}
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,metrics,prometheus}
  metrics:
    tags:
      application: beyou-backend
    distribution:
      percentiles-histogram:
        http.server.requests: true
