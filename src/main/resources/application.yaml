spring:
  profiles:
    active: ${ACTIVE_PROFILE}
  threads:
    virtual:
      enabled: true
  application:
    name: backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5490/beyou}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Flyway owns the schema in every environment; Hibernate only validates
      # entity mappings against it. Guarded by SchemaOwnershipGuard — no env
      # override on purpose (a stray `update` would mean two schema writers).
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
  ai:
    deepseek:
      api-key: ${DEEP_API_KEY:dev-noop}
      chat:
        options:
          model: ${AI_AGENT_MODEL:deepseek-v4-flash}
    openai:
      api-key: ${AI_API_KEY:dev-noop}
      chat:
        options:
          model: ${AI_ROUTINE_MODEL:gpt-5-mini}
          reasoning-effort: ${AI_REASONING_EFFORT:low}
    chat:
      client:
        enabled: false
      memory:
        repository:
          jdbc:
            initialize-schema: never
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      # Slightly above the service-level 5MB check so a 5-6MB upload reaches
      # PhotoStorageService and gets the friendly PHOTO_UPLOAD_TOO_LARGE message
      # (with the actual size); anything larger is rejected at the container with
      # the same error key via GlobalExceptionHandler.
      max-file-size: 6MB
      max-request-size: 6MB

app:
  upload-dir: ${UPLOAD_DIR:./uploads}

server:
  port: 8099
  address: 0.0.0.0
  servlet:
    context-path: /api/v1

cookie:
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Lax}

cors:
  allowed-pattern: ${CORS_ALLOWED_PATTERN}

api:
  security:
    token:
      secret: ${TOKEN_SECRET}

google:
  secrets:
    clientId: ${GOOGLE_CLIENT_ID}
    clientSecret: ${GOOGLE_CLIENT_SECRET}
  mobile:
    # Allowed audiences for mobile Google ID tokens (comma-separated). Defaults to
    # the web client id; add the Android/iOS client ids via GOOGLE_MOBILE_AUDIENCES.
    audiences: ${GOOGLE_MOBILE_AUDIENCES:${GOOGLE_CLIENT_ID}}
  url:
    oauth: ${OAUTH_GOOGLE_URL}
    userInfo: ${USER_INFO_GOOGLE_URL}

frontend:
    url: ${FRONTEND_URL}

mail:
  from: ${MAIL_FROM:${MAIL_USERNAME}}

password-reset:
  token-ttl-minutes: ${PASSWORD_RESET_TTL_MINUTES:15}
  cooldown-minutes: ${PASSWORD_RESET_COOLDOWN_MINUTES:5}

rate-limit:
  enabled: true

ai:
  routine:
    enabled: ${AI_ROUTINE_ENABLED:true}
  llm-chain:
    order: ${LLM_CHAIN_ORDER:mistral,gemini,glm,nvidia,deepseek}
    cooldown-rate-limit-seconds: ${LLM_COOLDOWN_RATELIMIT:300}
    cooldown-error-seconds: ${LLM_COOLDOWN_ERROR:30}
    providers:
      gemini:
        base-url: https://generativelanguage.googleapis.com/v1beta/openai
        api-key: ${GEMINI_API_KEY:}
        model: ${GEMINI_MODEL:gemini-2.5-flash}
      mistral:
        base-url: https://api.mistral.ai/v1
        api-key: ${MISTRAL_API_KEY:}
        model: ${MISTRAL_MODEL:mistral-small-latest}
      glm:
        base-url: https://api.z.ai/api/paas/v4
        api-key: ${GLM_API_KEY:}
        model: ${GLM_MODEL:glm-4.7-flash}
      nvidia:
        base-url: https://integrate.api.nvidia.com/v1
        api-key: ${NVIDIA_API_KEY:}
        model: ${NVIDIA_MODEL:meta/llama-3.3-70b-instruct}

docs:
  import:
    repoOwner: ${DOCS_IMPORT_REPO_OWNER:AndDev741}
    repoName: ${DOCS_IMPORT_REPO_NAME:beyou-arch-design}
    branch: ${DOCS_IMPORT_BRANCH:main}
    path: ${DOCS_IMPORT_PATH:architecture}
    blog:
      path: ${DOCS_IMPORT_BLOG_PATH:blog}
    api:
      path: ${DOCS_IMPORT_API_PATH:api}
    projects:
      path: ${DOCS_IMPORT_PROJECTS_PATH:projects}
    token: ${DOCS_IMPORT_TOKEN:}
    secret: ${DOCS_IMPORT_SECRET:}

management:
  server:
    port: ${MANAGEMENT_PORT:9091}
    address: ${MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,metrics,prometheus}
  metrics:
    tags:
      application: beyou-backend
    distribution:
      percentiles-histogram:
        http.server.requests: true
