spring:
  # Datasource is configured dynamically by AbstractIntegrationTest
  # via Testcontainers PostgreSQL (@DynamicPropertySource)
  datasource:
    hikari:
      # Keep connection pool small — multiple Spring test contexts share one
      # PostgreSQL container with default max_connections=100.
      maximum-pool-size: 2
      minimum-idle: 0
  jpa:
    hibernate:
      ddl-auto: create-drop
  mail:
    host: test
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8011

api:
  security:
    token:
      secret: test-secret-that-is-at-least-32-characters-long

google:
  secrets:
    clientId: test
    clientSecret: test
  url:
    oauth: test
    userInfo: test

frontend:
  url: test

mail:
  from: test@example.com

password-reset:
  token-ttl-minutes: 15
  cooldown-minutes: 1

cookie:
  secure: false
  same-site: Lax

cors:
  allowed-pattern: http://localhost:3000

rate-limit:
  enabled: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
