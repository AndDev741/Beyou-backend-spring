spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: test
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8011

api:
  security:
    token:
      secret: test-secret-that-is-at-least-32-characters-long

google:
  secrets:
    clientId: test
    clientSecret: test
  url:
    oauth: test
    userInfo: test

frontend:
  url: test

mail:
  from: test@example.com

password-reset:
  token-ttl-minutes: 15
  cooldown-minutes: 1

cookie:
  secure: false
  same-site: Lax

cors:
  allowed-pattern: http://localhost:3000

rate-limit:
  enabled: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
