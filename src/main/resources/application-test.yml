spring:
  # Datasource is configured dynamically by AbstractIntegrationTest
  # via Testcontainers PostgreSQL (@DynamicPropertySource)
  datasource:
    hikari:
      # Keep connection pool small — multiple Spring test contexts share one
      # PostgreSQL container with default max_connections=100.
      maximum-pool-size: 2
      minimum-idle: 0
  jpa:
    hibernate:
      # Flyway (inherited from application.yaml) migrates the Testcontainers DB;
      # validate turns every integration test into a drift check between the
      # migrations and the entity mappings.
      ddl-auto: validate
    properties:
      hibernate:
        # Enable query/fetch counters for N+1 detection in tests.
        # Read via SessionFactory.getStatistics() — see HibernateStatistics test helper.
        # Never enable in production: ~1-2% overhead and the JVM-singleton counters
        # don't aggregate cleanly across multi-pod deployments.
        generate_statistics: true
  # Dummy AI key so the OpenAI autoconfiguration can boot; the generator is
  # never invoked in tests (services are mocked / canned).
  ai:
    openai:
      api-key: test-noop
  mail:
    host: test
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8011

api:
  security:
    token:
      secret: test-secret-that-is-at-least-32-characters-long

google:
  secrets:
    clientId: test
    clientSecret: test
  mobile:
    audiences: test
  url:
    oauth: test
    userInfo: test

frontend:
  url: test

mail:
  from: test@example.com

password-reset:
  token-ttl-minutes: 15
  cooldown-minutes: 1

cookie:
  secure: false
  same-site: Lax

cors:
  allowed-pattern: http://localhost:3000

rate-limit:
  enabled: false

management:
  server:
    port: ${MANAGEMENT_PORT:9091}
    address: ${MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,metrics,prometheus}
  metrics:
    tags:
      application: beyou-backend
    distribution:
      percentiles-histogram:
        http.server.requests: true

app:
  upload-dir: ${UPLOAD_DIR:/tmp/beyou-test-uploads}
