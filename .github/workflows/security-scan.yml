name: Security Scan

on:
  # Weekly scan against the latest NVD database
  schedule:
    - cron: '0 4 * * 1'  # Monday 04:00 UTC
  # Also run on pushes to main so we catch new dependencies
  push:
    branches: [main]
  # Manual trigger for ad-hoc scans
  workflow_dispatch:

jobs:
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Cache OWASP NVD database
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-

      - name: Run OWASP dependency check
        # Fails build on any CVE with CVSS score >= 7 (configured in pom.xml)
        run: mvn -B org.owasp:dependency-check-maven:check

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30
