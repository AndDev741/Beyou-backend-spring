name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # labeled/unlabeled re-run the migration-checks job so its escape-hatch
    # labels (migration-rewrite, no-schema-change) take effect without a push.
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # Migration guardrails — conventions enforced by machinery, not memory.
  # The deeper drift gate (Flyway + ddl-auto=validate + SchemaIndexParityTest)
  # runs inside `mvn verify` in build-and-test.
  migration-checks:
    name: Migration checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    # Lint-only job: never needs the workflow-level packages:write.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Versioned migrations are immutable once merged: fix forward with a new
      # V<n>. Pre-production only, a baseline squash (scripts/generate-baseline.sh)
      # is allowed via the 'migration-rewrite' label + a repo tag.
      - name: Immutability tripwire (V*.sql never modified/deleted/renamed)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'migration-rewrite') }}
        run: |
          base="origin/${{ github.base_ref }}"
          changed=$(git diff --name-status --diff-filter=MDR "$base"...HEAD -- 'src/main/resources/db/migration/V*.sql')
          if [ -n "$changed" ]; then
            echo "::error::Versioned migrations already on ${{ github.base_ref }} were modified, deleted, or renamed:"
            echo "$changed"
            echo "Write a new V<n> migration instead. (Pre-prod baseline squash: use the 'migration-rewrite' label.)"
            exit 1
          fi
          echo "OK — no merged versioned migration was touched."

      # An @Entity change without a migration is how schema drift starts.
      # Java-only edits (no schema impact) opt out via the 'no-schema-change' label.
      - name: Entity change requires a migration
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-schema-change') }}
        run: |
          base="origin/${{ github.base_ref }}"
          entity_changed=""
          for f in $(git diff --name-only "$base"...HEAD -- 'src/main/java/**/*.java'); do
            # Check the file at HEAD *and* at the base: a deleted entity class
            # (or a removed @Entity annotation) is a schema change too.
            if { [ -f "$f" ] && grep -qE '@(Entity|Embeddable)([^A-Za-z]|$)' "$f"; } \
               || git show "$base:$f" 2>/dev/null | grep -qE '@(Entity|Embeddable)([^A-Za-z]|$)'; then
              entity_changed="$entity_changed $f"
            fi
          done
          new_migrations=$(git diff --name-only --diff-filter=A "$base"...HEAD -- 'src/main/resources/db/migration/')
          if [ -n "$entity_changed" ] && [ -z "$new_migrations" ]; then
            echo "::error::Entity classes changed but no migration was added:$entity_changed"
            echo "Add a V<n> migration under src/main/resources/db/migration/,"
            echo "or add the 'no-schema-change' label if the edit has no schema impact."
            exit 1
          fi
          echo "OK — entity and migration changes are consistent."

      # Postgres lock-risk linting (squawkhq.com). The baseline is generated
      # (not hand-written DDL) so it is excluded. require-concurrent-index-creation
      # and require-timeout-settings are excluded deliberately while pre-production
      # (empty/small tables — a plain CREATE INDEX is instant and takes no meaningful
      # lock; documented in V2__add_supporting_indexes.sql) — remove both exclusions
      # before the first migration that touches a large production table.
      - name: Squawk lint on added migrations
        run: |
          base="origin/${{ github.base_ref }}"
          added=$(git diff --name-only --diff-filter=A "$base"...HEAD -- 'src/main/resources/db/migration/*.sql' | grep -v 'V1__baseline.sql' || true)
          if [ -z "$added" ]; then
            echo "No new migrations to lint."
            exit 0
          fi
          # Pinned to a major so a squawk release can't silently change the gate.
          npx --yes squawk-cli@2 --exclude=require-concurrent-index-creation,require-timeout-settings $added

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # A bare label add/remove only needs migration-checks to re-run — skip the
    # expensive build -> e2e -> publish chain (both need this job) on pure label events.
    if: ${{ github.event.action != 'labeled' && github.event.action != 'unlabeled' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    steps:
      - name: Checkout backend (under test)
        uses: actions/checkout@v7
        with:
          path: backend

      - name: Checkout e2e tests
        uses: actions/checkout@v7
        with:
          repository: AndDev741/Beyou-e2e-tests
          ref: main
          path: e2e

      - name: Checkout dev-env
        uses: actions/checkout@v7
        with:
          repository: AndDev741/Beyou-dev-env
          ref: main
          path: dev-env

      - name: Checkout frontend (main, counterpart)
        uses: actions/checkout@v7
        with:
          repository: AndDev741/Beyou-Frontend
          ref: main
          path: frontend

      - name: Build backend image (under test)
        run: docker build --target runtime -t beyou-backend:e2e ./backend

      - name: Build web image (counterpart from main)
        run: |
          docker build --target nginx \
            --build-arg VITE_API_URL=http://localhost:8099/api/v1 \
            -t beyou-web:e2e -f ./frontend/apps/web/Dockerfile ./frontend

      - name: Boot the stack
        working-directory: dev-env
        run: docker compose -f docker-compose.e2e.yml up -d --wait

      - name: Wait for backend + web to serve
        run: |
          for i in $(seq 1 90); do curl -s -o /dev/null http://localhost:8099 && break; sleep 2; done
          for i in $(seq 1 30); do curl -s -o /dev/null http://localhost:3000 && break; sleep 2; done

      - name: Run Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          BASE_URL=http://localhost:3000 npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Dump backend logs on failure
        if: failure()
        working-directory: dev-env
        run: docker compose -f docker-compose.e2e.yml logs backend

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: [build-and-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ghcr.io/anddev741/beyou-backend:latest
            ghcr.io/anddev741/beyou-backend:sha-${{ env.SHORT_SHA }}
